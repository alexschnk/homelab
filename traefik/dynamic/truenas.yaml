http:
 #region routers 
  routers:
    truenas:
      entryPoints:
        - "https"
      rule: "Host(`truenas.homelab.ru`)"        # Change DOMAIN_NAME to yours
      middlewares:
        - security-headers
      tls: {}
      service: truenas

  services:
    truenas:
      loadBalancer:
        servers:
          - url: "https://192.168.31.201"            # Change IP Address to your proxmox instance
        passHostHeader: true
