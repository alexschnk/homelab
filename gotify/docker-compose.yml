services:
  gotify:
    image: gotify/server
    container_name: gotify
    restart: unless-stopped
    networks:
      proxy:
#    ports:
#      - 8080:80
    environment:
      - TZ=Europe/Moscow
    volumes:
      - ./data:/app/data
    security_opt: 
      - no-new-privileges
    labels: 
      - "traefik.enable=true" # Enable Traefik on this service
      - "traefik.http.routers.gotify.entrypoints=https" # Secure entrypoint for HTTPS
      - "traefik.http.routers.gotify.rule=Host(`gotify.homelab.ru`)"  # Host rule for secure routing
      - "traefik.http.routers.gotify.tls=true" # Enable TLS for secure connection
      - "traefik.http.routers.gotify.middlewares=security-headers@file"
      - "traefik.http.services.gotify.loadbalancer.server.port=80"

networks:
  proxy:
    name: proxy 
    external: true
